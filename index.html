<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruota della Fortuna</title>

<style>
:root{
--size:520px;
--pointer-size:34px;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b111f;
font-family:Arial;
color:white;
flex-direction:column;
}

.container{
display:grid;
grid-template-columns:1fr 300px;
gap:30px;
align-items:center;
}

.panel{
background:#111a2e;
padding:20px;
border-radius:18px;
}

.wheel-wrap{
width:var(--size);
height:var(--size);
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.wheel{
width:92%;
height:92%;
border-radius:50%;
transition:transform 3.5s cubic-bezier(.1,.85,.35,1);
}

.pointer{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:var(--pointer-size) solid transparent;
border-right:var(--pointer-size) solid transparent;
border-bottom:40px solid #ffd27a;
}

.center{
position:absolute;
width:28%;
height:28%;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0f1629;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.label{
position:absolute;
top:50%;
left:50%;
font-weight:700;
font-size:13px;
background:white;
color:black;
padding:4px 8px;
border-radius:6px;
transform:translate(-50%,-50%);
}

.btn{
padding:14px 18px;
border-radius:12px;
border:0;
font-weight:700;
font-size:16px;
cursor:pointer;
background:#ff9c2f;
margin-top:10px;
}

.result{
margin-top:16px;
padding:12px;
background:#0f1629;
border-radius:10px;
text-align:center;
}

.login-btn{
margin-bottom:20px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#2f7cff;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<button class="login-btn" onclick="location.href='login.html'">Login Admin</button>

<div class="container">
<div class="panel">
<div class="wheel-wrap">
<div class="pointer"></div>
<div id="wheel" class="wheel"></div>
<div class="center">RUOTA</div>
</div>
</div>

<div class="panel">
<button id="spinBtn" class="btn">Gira la ruota</button>
<div id="result" class="result">Premi il bottone</div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔹 METTI QUI IL TUO FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBT6NIPqhYaMIWcfvkNcPhkh9-_2D21BS8",
  authDomain: "ruota-fortuna.firebaseapp.com",
  projectId: "ruota-fortuna",
  storageBucket: "ruota-fortuna.firebasestorage.app",
  messagingSenderId: "1083598318489",
  appId: "1:1083598318489:web:ef9bd70453415c6a5ec108"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const totalSegments = 29;
const wheel = document.getElementById("wheel");
const spinBtn = document.getElementById("spinBtn");
const resultDiv = document.getElementById("result");
const anglePer = 360 / totalSegments;

let currentRotation = 0;
let spinCount = 0;
let spinning = false;

let forcedNumbers = [];
let bannedNumbers = [];

// RUOTA GRAFICA
function buildGradient(){
  let stops=[];
  for(let i=0;i<totalSegments;i++){
      let hue=(i/totalSegments)*360;
      stops.push(`hsl(${hue} 70% 55%) ${i*anglePer}deg ${(i+1)*anglePer}deg`);
  }
  return `conic-gradient(${stops.join(",")})`;
}

wheel.style.background = buildGradient();

for(let n=1;n<=29;n++){
  let el=document.createElement("div");
  el.className="label";
  el.textContent=n;
  let angle=(n-1)*anglePer+anglePer/2;
  let r=42;
  let x=50+Math.cos(angle*Math.PI/180-Math.PI/2)*r;
  let y=50+Math.sin(angle*Math.PI/180-Math.PI/2)*r;
  el.style.left=x+"%";
  el.style.top=y+"%";
  wheel.appendChild(el);
}

// CARICA NUMERI FIREBASE
async function loadSettings(){
    spinBtn.disabled=true;
    try{
        let docSnap = await getDoc(doc(db,"settings","wheel"));
        if(docSnap.exists()){
            forcedNumbers = (docSnap.data().forcedNumbers || []).map(n=>Number(n));
            bannedNumbers = (docSnap.data().bannedNumbers || []).map(n=>Number(n));
        } else {
            forcedNumbers = [];
            bannedNumbers = [];
        }
        spinCount = 0;
    } catch(e){
        console.error("Errore caricamento dati:", e);
        forcedNumbers = [];
        bannedNumbers = [];
        spinCount = 0;
    }
    spinBtn.disabled=false;
}
await loadSettings();

// SCELTA NUMERO
function getNumber(){
    if(spinCount < forcedNumbers.length) return forcedNumbers[spinCount];
    let num;
    do{
        num = Math.floor(Math.random()*29)+1;
    } while(bannedNumbers.includes(num));
    return num;
}

// CALCOLO ROTAZIONE
function getRotation(num){
    let index=num-1;
    let angleCenter=index*anglePer+anglePer/2;
    let base=(360-angleCenter)%360;
    let extraSpins=Math.floor(Math.random()*3)+8;
    let normalized=currentRotation%360;
    let adjust=(360-normalized+base)%360;
    return currentRotation + extraSpins*360 + adjust;
}

// SPIN
function spin(){
    if(spinning) return;
    spinning=true;
    spinBtn.disabled=true;

    let number=getNumber();
    spinCount++;

    let finalRotation=getRotation(number);
    wheel.style.transform=`rotate(${finalRotation}deg)`;

    setTimeout(()=>{
        currentRotation=finalRotation;
        resultDiv.innerHTML=`È uscito il numero <strong>${number}</strong>`;
        spinning=false;
        spinBtn.disabled=false;
    },3500);
}

spinBtn.onclick=spin;

</script>

</body>
</html>
