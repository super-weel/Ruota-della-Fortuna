<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pannello Admin</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b111f;
font-family:Arial;
color:white;
}

.panel{
background:#111a2e;
padding:35px;
border-radius:18px;
width:360px;
text-align:center;
}

h2{
margin-top:0;
margin-bottom:25px;
}

label{
display:block;
text-align:left;
margin-bottom:6px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-bottom:18px;
border-radius:10px;
border:none;
font-size:15px;
}

.btn{
padding:14px 18px;
border-radius:12px;
border:0;
font-weight:700;
font-size:16px;
cursor:pointer;
background:#ff9c2f;
width:100%;
}

.success{
margin-top:15px;
color:#7CFC9A;
}

</style>
</head>

<body>

<div class="panel">

<h2>Pannello amministratore</h2>

<label>Numeri che devono uscire (separati da virgola)</label>
<input id="forcedNumbers" placeholder="es: 1,5,8">

<label>Numeri che NON devono uscire</label>
<input id="bannedNumbers" placeholder="es: 6,10">

<button class="btn" onclick="save()">Salva impostazioni</button>

<div id="msg" class="success"></div>

</div>

<script type="module">

/* 🔐 CONTROLLO LOGIN */

if(localStorage.getItem("logged") !== "true"){
window.location.href = "login.html";
}

/* 🔥 FIREBASE */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBT6NIPqhYaMIWcfvkNcPhkh9-_2D21BS8",
  authDomain: "ruota-fortuna.firebaseapp.com",
  projectId: "ruota-fortuna",
  storageBucket: "ruota-fortuna.firebasestorage.app",
  messagingSenderId: "1083598318489",
  appId: "1:1083598318489:web:ef9bd70453415c6a5ec108"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* CARICA DATI */

async function load(){

const docRef = doc(db,"settings","wheel");
const snap = await getDoc(docRef);

if(snap.exists()){

document.getElementById("forcedNumbers").value =
snap.data().forcedNumbers.join(",");

document.getElementById("bannedNumbers").value =
snap.data().bannedNumbers.join(",");

}

}

load();

/* SALVA DATI */

window.save = async function(){

let forced =
document.getElementById("forcedNumbers").value
.split(",")
.map(n => Number(n.trim()))
.filter(n => !isNaN(n));

let banned =
document.getElementById("bannedNumbers").value
.split(",")
.map(n => Number(n.trim()))
.filter(n => !isNaN(n));

await setDoc(doc(db,"settings","wheel"),{

forcedNumbers: forced,
bannedNumbers: banned

});

document.getElementById("msg").innerText = "Impostazioni salvate ✔";

};

</script>

</body>
</html>
